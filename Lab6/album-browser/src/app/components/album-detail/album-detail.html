<div *ngIf="album">
  <h2>Album Details</h2>
  <p>ID: {{ album.id }}</p>
  <div>
    <label>Title: </label>
    <input [(ngModel)]="album.title" />
  </div>
  <button (click)="save()">Save</button>
  <button routerLink="/albums">Back</button>
  <br><br>
  <a [routerLink]="['/albums', album.id, 'photos']">View Photos</a>
</div>
<p *ngIf="!album">Loading...</p>
