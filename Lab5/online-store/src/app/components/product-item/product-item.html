<div class="product-grid">
  <div class="product-card">

    <div class="image-wrapper">
      <img [src]="product.image" [alt]="product.name" class="product-image">
    </div>

    <div class="product-info">
      <a [href]="product.link" target="_blank" class="product-title">
        {{ product.name }}
      </a>

      <p class="product-description">{{ product.description }}</p>

      <div class="rating-row">
        <span class="stars">
          @for (s of [1,2,3,4,5]; track s) {
          <span [style.color]="s <= product.rating ? '#FF4431' : '#CDCDCD'">★</span>
          }
        </span>
        <span> {{ product.rating }}</span>
      </div>

      <div class="price">{{ product.price }} ₸</div>

      <div class="buttons">

        <button class="btn-like" (click)="like()">
          <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#FF4431">
            <path
              d="m480-120-58-52q-101-91-167-157T150-447.5Q111-500 95.5-544T80-634q0-94 63-157t157-63q52 0 99 22t81 62q34-40 81-62t99-22q94 0 157 63t63 157q0 46-15.5 90T810-447.5Q771-395 705-329T538-172l-58 52Zm0-108q96-86 158-147.5t98-107q36-45.5 50-81t14-70.5q0-60-40-100t-100-40q-47 0-87 26.5T518-680h-76q-15-41-55-67.5T300-774q-60 0-100 40t-40 100q0 35 14 70.5t50 81q36 45.5 98 107T480-228Zm0-273Z" />
          </svg>
          {{ product.likes || 0 }}
        </button>

        <button class='btn-tg' (click)="share('telegram')">

      </div>

    </div>
  </div>
</div>
